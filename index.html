<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <title>🎓 DSE 升學選科智能顧問</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ececf1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background-color: #202123;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #303134;
        }
        .chat-header {
            background-color: #2d2e32;
            padding: 18px 24px;
            border-bottom: 1px solid #3e3f44;
            display: flex;
            align-items: center;
        }
        .chat-header h1 {
            margin: 0;
            font-size: 1.25rem;
            color: #ffffff;
            font-weight: 600;
        }
        .messages-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message-row {
            display: flex;
            width: 100%;
        }
        .message-row.user { justify-content: flex-end; }
        .message-row.agent { justify-content: flex-start; }
        
        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .user .bubble {
            background-color: #10a37f;
            color: white;
            border-bottom-right-radius: 2px;
        }
        .agent .bubble {
            background-color: #2d2e32;
            color: #ececf1;
            border-bottom-left-radius: 2px;
            border: 1px solid #3e3f44;
        }
        .input-area {
            padding: 20px;
            background-color: #202123;
            border-top: 1px solid #3e3f44;
            display: flex;
            gap: 12px;
        }
        input[type="text"] {
            flex: 1;
            background-color: #343541;
            border: 1px solid #4e4f56;
            border-radius: 8px;
            color: white;
            padding: 14px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #10a37f; }
        button {
            background-color: #10a37f;
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #1a7f64; }
        button:disabled { background-color: #4e4f56; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h1>🎓 JUPAS / DSE 升學選科智能顧問</h1>
    </div>
    <div class="messages-area" id="msgBox">
        <div class="message-row agent">
            <div class="bubble">同學你好！我係你嘅 DSE 升學選科小助手。話我知你高中修讀咩科目、預估分數，或者未來想邊個方向發展，我即時幫你進行大數據聯招落點分析！</div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="例如：我選修化學、旅遊、經濟，大學有咩好科推薦？" onkeydown="if(event.key==='Enter') send()">
        <button id="sendBtn" onclick="send()">諮詢助手</button>
    </div>
</div>

<script>
    async function send() {
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const box = document.getElementById('msgBox');
    const text = input.value.trim();

    if(!text) return;

    input.value = '';
    input.disabled = true;
    btn.disabled = true;

    box.innerHTML += `<div class="message-row user"><div class="bubble">${text}</div></div>`;
    
    const agentRow = document.createElement('div');
    agentRow.className = 'message-row agent';
    const agentBubble = document.createElement('div');
    agentBubble.className = 'bubble';
    agentBubble.innerText = '正在為你分析全港八大課程計分公式...';
    agentRow.appendChild(agentBubble);
    box.appendChild(agentRow);
    box.scrollTop = box.scrollHeight;

    try {
        const response = await fetch('/api/chat-stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });

        if (!response.ok) throw new Error('網路回應不正常');

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let resultText = '';
        agentBubble.innerText = ''; 

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            // 直接累積後端過濾好的純文字
            const chunk = decoder.decode(value, { stream: true });
            resultText += chunk;
            
            // 將原本的 innerText 改為使用 marked 解析後的 innerHTML
            agentBubble.innerHTML = marked.parse(resultText);
            box.scrollTop = box.scrollHeight;
        }

    } catch (e) {
        console.error(e);
        agentBubble.innerText = '❌ 抱歉，系統暫時出現問題，請稍候再試。';
    } finally {
        input.disabled = false;
        btn.disabled = false;
        input.focus();
    }
}
    
</script>

</body>
</html>
